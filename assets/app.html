<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/350d66f187.js" crossorigin="anonymous"></script>
    <link rel="icon" href="assets/logoFacebook.png">
    <title>Facebook - Connexion ou inscription</title>
</head>

<body>
    <div>
        <h1 class="text-center translate-y-28 text-3xl font-bold text-blue-600 ">
            Facebook
        </h1>
    </div>
    <div class="hover:bg-blue-200 translate-y-32 border-2 rounded-lg border-solid border-blue-400 w-1/2 text-center m-auto my-4  p-0 flex">
        <div class="bg-blue-400 w-12 h-10">
            <i class="fa-solid fa-circle-info py-3"></i>
        </div>
        <p class="py-2 px-1.5 text-sm">Vous devez vous connecter pour continuer.</p>
    </div>
    <div class="bg-white grid grid-cols-1 rounded-xl shadow-2xl w-1/4 h-96 text-center m-auto items-center translate-y-36">
        <p class="text-black text-xl py-0.5">Se connecter à Facebook</p>
        <div class="h-10 bg-orange-100 border text-sm border-solid border-2 border-orange-300  mx-4 justify-items-center">
            <p class="py-1.5">Vous devez vous connecter pour continuer</p>
        </div>
        <input type="text" class="focus-cursor-auto placeholder:text-gray-800 placeholder:p-4 placeholder:text-lg py-6 rounded-lg h-12 border-solid border-2 border-gray-400 mx-4" placeholder="Adresse e-mail ou numéro de tél.">
        <input type="text" class="placeholder:text-gray-800 placeholder:p-4 placeholder:text-lg py-6 rounded-lg h-12 border-solid border-2 border-gray-400 mx-4" placeholder="Mot de passe">
        <button class="bg-blue-600 text-center text-xl mx-4 rounded-lg h-12 text-white font-bold">Se connecter</button>
        <p class="text-blue-600">Informations de compte oubliées ? S'inscrire sur Facebook</p>
    </div>
</body>

</html>
